<h2>选择应用图标方向</h2>
<p class="subtitle">清简日系风格下，图标应该是什么样的？</p>

<div class="cards">
  <div class="card" data-choice="typographic" onclick="toggleSelect(this)">
    <div class="card-image" style="
      background: #FDF8F3;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      border: 1px solid #E8E0D8;
      gap: 20px;
    ">
      <div style="width:80px;height:80px;border-radius:18px;
        background: #F5EFE8;
        display:flex;align-items:center;justify-content:center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
        <div style="font-family:'Georgia',serif;font-size:38px;color:#5C4B3A;font-weight:700;">食</div>
      </div>
      <div style="font-size:11px;color:#9B8579;max-width:160px;">单个汉字「食」，衬线体，在米色圆角底上。简洁有力，像日式食器上的刻字。</div>
    </div>
    <div class="card-body">
      <h3>A · 单字</h3>
      <p>一个「食」字，极简。像 MUJI 标签，无多余信息，一眼认出。</p>
    </div>
  </div>

  <div class="card" data-choice="illustrative" onclick="toggleSelect(this)">
    <div class="card-image" style="
      background: #FDF8F3;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      border: 1px solid #E8E0D8;
      gap: 20px;
    ">
      <div style="width:80px;height:80px;border-radius:18px;
        background: linear-gradient(135deg, #E8DDD0, #F0E8DE);
        display:flex;align-items:center;justify-content:center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
        <div style="font-size:36px;">🥢</div>
      </div>
      <div style="font-size:11px;color:#9B8579;max-width:160px;">一双筷子 + 碗的极简线条插画，温暖的米色渐变底。有画面感但不花哨。</div>
    </div>
    <div class="card-body">
      <h3>B · 插画线条</h3>
      <p>简约线条插画（碗筷），温暖克制。有识别度，一看就知道是吃饭相关的 App。</p>
    </div>
  </div>

  <div class="card" data-choice="abstract" onclick="toggleSelect(this)">
    <div class="card-image" style="
      background: #FDF8F3;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      border: 1px solid #E8E0D8;
      gap: 20px;
    ">
      <div style="width:80px;height:80px;border-radius:18px;
        background: linear-gradient(135deg, #A8C5A0, #C5D5B5);
        display:flex;align-items:center;justify-content:center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
        <div style="font-family:'Georgia',serif;font-size:20px;color:white;font-weight:700;">?吃</div>
      </div>
      <div style="font-size:11px;color:#9B8579;max-width:160px;">淡绿渐变底 + 「?吃」文字组合。呼应 App 名称「今天吃什么」的核心问题。</div>
    </div>
    <div class="card-body">
      <h3>C · 文字组合</h3>
      <p>淡绿色底上的「?吃」组合。呼应 App 名称中的「吃什么」，颜色来自日系淡绿。</p>
    </div>
  </div>
</div>
