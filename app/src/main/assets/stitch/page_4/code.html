<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            font-family: theme('fontFamily.body-md');
        }
        
        .hand-drawn-border {
            border: 2px solid theme('colors.secondary');
            border-radius: theme('borderRadius.xl');
        }
        
        .squishy-shadow {
            box-shadow: 0 4px 0 0 theme('colors.secondary');
        }

        .squishy-shadow:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 0 theme('colors.secondary');
        }
        
        .glass-card {
            background: rgba(253, 209, 220, 0.4);
            backdrop-filter: blur(8px);
        }
        
        .tab-active {
            background-color: theme('colors.primary');
            color: theme('colors.on-primary');
            box-shadow: 0 2px 0 0 theme('colors.secondary');
        }

        /* 动画类 */
        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-slide-up {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .nav-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }

        .heart-shape {
            position: relative;
            width: 48px;
            height: 48px;
        }
        .heart-shape::before,
        .heart-shape::after {
            content: '';
            position: absolute;
            top: 0;
            width: 24px;
            height: 38px;
            border-radius: 24px 24px 0 0;
            background: rgba(137, 76, 92, 0.15); /* primary color transparent */
        }
        .heart-shape::before {
            left: 24px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }
        .heart-shape::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }
    </style>

<script>
        // Simple tab interaction
        const tabs = document.querySelectorAll('.flex.space-x-4 button');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // Remove active classes from all
                tabs.forEach(t => {
                    t.classList.remove('tab-active');
                    t.classList.add('bg-white', 'text-secondary');
                });
                // Add active classes to clicked
                tab.classList.remove('bg-white', 'text-secondary');
                tab.classList.add('tab-active');
            });
        });
    </script>
