<html lang="zh-CN"><head>

<style>
        body {
            background: linear-gradient(135deg, #FFF4F0 0%, #FFE3E9 50%, #FFF8EA 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        
        /* Decorative Background Elements */
        .bg-deco-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 185, 200, 0.2);
            filter: blur(40px);
            z-index: 0;
        }
        .bg-deco-heart {
            position: absolute;
            opacity: 0.15;
            z-index: 0;
            color: #FF7D9D;
            transform: rotate(-15deg);
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 217, 226, 0.8);
            box-shadow: 0 8px 32px rgba(137, 76, 92, 0.08);
        }

        /* Input Fields */
        .tactile-input {
            background: rgba(255, 244, 240, 0.7);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .tactile-input:focus-within {
            background: #ffffff;
            border-color: #f4a7b9;
            box-shadow: 0 4px 12px rgba(244, 167, 185, 0.15);
        }

        /* Custom Checkbox */
        .squishy-checkbox {
            appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid #d6c1c5;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            position: relative;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .squishy-checkbox:checked {
            background-color: #894c5c;
            border-color: #894c5c;
            transform: scale(1.05);
        }
        .squishy-checkbox:checked::after {
            content: "";
            position: absolute;
            left: 7px;
            top: 3px;
            width: 6px;
            height: 12px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* Gradient Button */
        .btn-gradient {
            background: linear-gradient(90deg, #FF7D9D 0%, #FFB08A 100%);
            box-shadow: 0 4px 0 #e06886, 0 8px 16px rgba(255, 125, 157, 0.25);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-gradient:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #e06886, 0 4px 8px rgba(255, 125, 157, 0.15);
        }
    </style>
</head>
<body class="font-body-md text-on-surface relative">
<!-- Decorative Background -->
<div class="bg-deco-circle w-64 h-64 top-[-10%] left-[-10%]"></div>
<div class="bg-deco-circle w-96 h-96 bottom-[-20%] right-[-10%] bg-opacity-30" style="background: rgba(255, 248, 234, 0.4)"></div>
<span class="material-symbols-outlined bg-deco-heart top-[15%] right-[20%] text-[80px]" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="material-symbols-outlined bg-deco-heart bottom-[30%] left-[10%] text-[120px] transform rotate-[25deg]" style="font-variation-settings: 'FILL' 1;">favorite</span>
<main class="flex-1 flex flex-col justify-center items-center px-margin-mobile relative z-10 py-12">
<!-- Header Section -->
<div class="text-center mb-10 w-full max-w-sm flex flex-col items-center">
<div class="w-32 h-32 rounded-[2.5rem] overflow-hidden mb-6 border-4 border-white shadow-lg bg-white relative">
<img alt="Two cute mascot dogs sharing a meal" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCInS03c7T4Xmf4DqDI6GAmc6re1S1VLb01jDSz40RYlbPgAZpAl9dHe-TEQZwMGKWQeMKImCESIcEFPbiYaDySglbpBJW7JuwpNK5SDA-_OEUTREwpAPFlJaeFhlHL7U4m9mrxkqvKxN1j4Y95wtPey3f4SEqyz1rYM9e6PtNvZg04K0RZK9itBxAxLj1uX_C8WG4YSpiMBJCg7FcNm4j7My46e9RY844VGZFSb4ThkPIPY5ta5F3n68yFnRJ_UjSJxw"/>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-primary-fixed mb-2 tracking-tight">欢迎回来</h1>
<p class="font-body-md text-body-md text-on-surface-variant">今天也一起好好吃饭吧</p>
</div>
<!-- Login Card -->
<div class="glass-card w-full max-w-sm rounded-[28px] p-6 sm:p-8 flex flex-col gap-6 relative">
<!-- Inputs -->
<div class="flex flex-col gap-5">
<div class="tactile-input rounded-2xl flex items-center px-4 py-1 h-[60px]">
<span class="material-symbols-outlined text-outline-variant mr-3 text-[28px]">person</span>
<input class="w-full bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface placeholder-on-surface-variant/50 h-full py-0 outline-none" placeholder="账号 / 邮箱 / 手机号" type="text"/>
</div>
<div class="tactile-input rounded-2xl flex items-center px-4 py-1 h-[60px] relative group">
<span class="material-symbols-outlined text-outline-variant mr-3 text-[28px]">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface placeholder-on-surface-variant/50 h-full py-0 pr-10 outline-none" placeholder="密码" type="password"/>
<button class="absolute right-4 text-outline-variant hover:text-primary transition-colors h-full flex items-center" type="button">
<span class="material-symbols-outlined text-[24px]">visibility_off</span>
</button>
</div>
</div>
<!-- Options Row -->
<div class="flex justify-between items-center px-1">
<label class="flex items-center gap-3 cursor-pointer group">
<input class="squishy-checkbox" type="checkbox"/>
<span class="font-body-md text-[15px] text-on-surface-variant group-hover:text-primary transition-colors">记住账号密码</span>
</label>
<a class="font-label-bold text-label-bold text-primary hover:text-on-primary-fixed transition-colors" href="#">忘记密码？</a>
</div>
<!-- Primary Action -->
<button class="btn-gradient w-full h-[64px] rounded-full text-white font-headline-md text-headline-md flex items-center justify-center mt-2 tracking-wide">
                登录
            </button>
</div>
<!-- Footer Link -->
<div class="mt-8">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2" href="#">
                还没有账号？<span class="font-label-bold text-label-bold underline decoration-2 underline-offset-4 decoration-primary-container">去注册</span>
</a>
</div>
</main>
</body></html>
