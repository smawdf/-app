<style>

<body class="min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<!-- Background Decoration -->
<div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-secondary-container/30 rounded-full blur-3xl opacity-50"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-tertiary-container/20 rounded-full blur-3xl opacity-50"></div>
</div>
<!-- Main Content Container -->
<main class="w-full max-w-[400px] z-10 relative flex flex-col gap-lg">
<!-- Header -->
<header class="text-center space-y-sm mb-md">
<div class="w-24 h-24 mx-auto mb-4 rounded-full overflow-hidden hand-drawn-border bg-surface-container-high flex items-center justify-center p-2">
<img alt="Mascot Logo" class="w-full h-full object-cover rounded-full" data-alt="A cute, soft kawaii-style illustration of two happy mascot dogs (one white, one light brown) sitting together at a cozy dining table. The style is hand-drawn with thick soft strokes, pastel colors, and a warm cream background, embodying a soft comfort aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCz5MVKOxbkLggmmvFFmEF1IS5Ap8t1cWuLBlxhFWqhpt_NnohcoTHpSr20WPM62RBsE67aIoviyKQbAhbz_jSdZaamiAMikVMEWP3jiJ1IFv4XoKhNgQaNCPd-ydbkf5qAXMKkX8-PyXH2ICS0SsRsRf9pRNnDlFeH_yNb1HA4YBPbWG9lvE7Yy3ftTNqVR5O4sVsHaOAxrI6DYnrWv7gx2iLVQ2XuiAJ7oGeUUuH0PpmzL4yKQxa4"/>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary">重置密码</h1>
<p class="font-body-md text-body-md text-on-surface-variant">用邮箱验证码找回账号</p>
</header>
<!-- Form Card -->
<div class="glass-card rounded-3xl p-lg flex flex-col gap-md">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-label-bold text-label-bold text-secondary ml-sm" for="email">邮箱地址</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full bg-surface border-2 border-outline-variant rounded-xl py-3 pl-[40px] pr-sm font-body-md text-body-md text-on-surface placeholder-outline transition-colors" id="email" placeholder="输入绑定的邮箱" required="" type="email"/>
</div>
</div>
<!-- Verification Code Input -->
<div class="space-y-xs">
<label class="font-label-bold text-label-bold text-secondary ml-sm" for="code">验证码</label>
<div class="flex gap-sm">
<div class="relative flex-1">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">password</span>
<input class="w-full bg-surface border-2 border-outline-variant rounded-xl py-3 pl-[40px] pr-sm font-body-md text-body-md text-on-surface placeholder-outline transition-colors" id="code" maxlength="6" placeholder="6位验证码" required="" type="text"/>
</div>
<button class="bg-secondary-container text-on-secondary-container font-label-bold text-label-bold px-md rounded-xl border-2 border-secondary hover:bg-secondary-container/80 transition-colors whitespace-nowrap active:scale-95" id="sendCodeBtn" type="button">获取验证码</button>
</div>
</div>
<!-- New Password Input -->
<div class="space-y-xs">
<label class="font-label-bold text-label-bold text-secondary ml-sm" for="newPassword">新密码</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full bg-surface border-2 border-outline-variant rounded-xl py-3 pl-[40px] pr-[40px] font-body-md text-body-md text-on-surface placeholder-outline transition-colors" id="newPassword" minlength="8" placeholder="设置新密码 (最少8位)" required="" type="password"/>
<button class="icon-btn absolute right-xs top-1/2 -translate-y-1/2 toggle-password" data-target="newPassword" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Input -->
<div class="space-y-xs">
<label class="font-label-bold text-label-bold text-secondary ml-sm" for="confirmPassword">确认新密码</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">lock_clock</span>
<input class="w-full bg-surface border-2 border-outline-variant rounded-xl py-3 pl-[40px] pr-[40px] font-body-md text-body-md text-on-surface placeholder-outline transition-colors" id="confirmPassword" placeholder="再次输入新密码" required="" type="password"/>
<button class="icon-btn absolute right-xs top-1/2 -translate-y-1/2 toggle-password" data-target="confirmPassword" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="mt-md w-full bg-primary text-on-primary font-label-bold text-label-bold py-3 rounded-full squishy-shadow transition-all relative overflow-hidden flex items-center justify-center gap-sm" type="button">
<span>重置密码</span>
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</div>
<!-- Footer Link -->
<div class="text-center mt-sm">
<a class="font-label-bold text-label-bold text-secondary hover:text-primary transition-colors flex items-center justify-center gap-xs inline-flex" href="#">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
                返回登录
            </a>
</div>
</main>
<script>
        // Password Visibility Toggle
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const icon = this.querySelector('span');

                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        });

        // Mock Send Code Countdown
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        let countdown = 0;
        let timer = null;

        sendCodeBtn.addEventListener('click', function() {
            if (countdown > 0) return;
            
            // Simple validation check for email visually (not real validation)
            const emailInput = document.getElementById('email');
            if(!emailInput.value) {
                emailInput.focus();
                return;
            }

            countdown = 59;
            this.disabled = true;
            this.classList.add('opacity-70', 'cursor-not-allowed');
            this.textContent = `重新发送 ${countdown}s`;

            timer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timer);
                    this.disabled = false;
                    this.classList.remove('opacity-70', 'cursor-not-allowed');
                    this.textContent = '获取验证码';
                } else {
                    this.textContent = `重新发送 ${countdown}s`;
                }
            }, 1000);
        });
    </script>
</body></html>
