<!-- Modal Interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('add-dish-modal');
            const openBtn = document.getElementById('add-dish-btn');
            const closeBtn = document.getElementById('close-modal-btn');
            const cancelBtn = document.getElementById('cancel-modal-btn');
            const backdrop = document.getElementById('modal-backdrop');

            const openModal = () => modal.classList.remove('hidden');
            const closeModal = () => modal.classList.add('hidden');

            openBtn.addEventListener('click', openModal);
            closeBtn.addEventListener('click', closeModal);
            cancelBtn.addEventListener('click', closeModal);
            backdrop.addEventListener('click', closeModal);
            
            // Toggle Switch logic for visual feedback (though CSS handles the look, we can add simple bounce)
            const toggles = document.querySelectorAll('.toggle-checkbox');
            toggles.forEach(toggle => {
                toggle.addEventListener('change', (e) => {
                    const label = e.target.nextElementSibling;
                    label.style.transform = 'scale(0.9)';
                    setTimeout(() => label.style.transform = 'scale(1)', 150);
                });
            });
        });
    </script>
</body></html>
