<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            /* Soft, tactile background pattern */
            background-image: radial-gradient(theme('colors.primary-fixed-dim') 1px, transparent 1px);
            background-size: 24px 24px;
        }
        
        .glass-card {
            background: rgba(255, 249, 243, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid theme('colors.outline-variant');
            box-shadow: 0 8px 32px 0 rgba(137, 76, 92, 0.1);
        }

        .squishy-btn {
            box-shadow: 0 4px 0 0 theme('colors.on-primary-fixed-variant');
            transition: all 0.1s ease;
        }
        
        .squishy-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 0 theme('colors.on-primary-fixed-variant');
        }

        .input-tactile {
            border: 2px solid theme('colors.outline-variant');
            transition: all 0.2s ease;
        }

        .input-tactile:focus {
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 4px theme('colors.primary-container');
            outline: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop font-body-md relative overflow-hidden">
<!-- Decorative Illustration Background Element -->
<div class="absolute -top-10 -right-10 w-64 h-64 opacity-20 pointer-events-none md:w-96 md:h-96 md:-top-20 md:-right-20">
<img class="w-full h-full object-contain" data-alt="A soft, hand-drawn style illustration of two cute mascot dogs sharing a small meal, minimalist kawaii aesthetic, primary pink and cream colors, light mode." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4dCLc0aZ0VJzaaxaBy4_EnekFawmY_ylP1-cFFZIV1TWWcIluKJAvkmYk0XJGyeB5dvCBA1yEhHRE5Pyr2IA-oeJeJMtRzOQHPRAVC--7VpTVaKaAeKXkO5MU5rZEviNcMK0XjQh8SJ3nHI6Lu_Sv4fX-moiXoT3Z0TyDoTNMbcdcPr6NvbUvU5KhdX-i-Ude0R4GeOYif_rnZHD71hqrgn-IES5CAcGiJD2ch3MWYtMbEhzlpeKA"/>
</div>
<main class="w-full max-w-[400px] z-10">
<!-- Header Section -->
<header class="text-center mb-xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-sm">
                创建你们的小饭桌
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                一起记录每一次想吃什么
            </p>
</header>
<!-- Glassmorphism Card -->
<div class="glass-card rounded-xl p-lg md:p-xl relative overflow-hidden">
<!-- Optional subtle texture overlay for the card -->
<div class="absolute inset-0 pointer-events-none bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjQiIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iMC4wNSIvPjwvc3ZnPg==')] opacity-50"></div>
<form class="flex flex-col gap-md relative z-10" id="registrationForm">
<!-- Account Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-secondary" for="account">账号/邮箱/手机号</label>
<input class="input-tactile bg-surface-container-lowest rounded-lg px-4 py-3 text-on-surface placeholder:text-outline-variant w-full" id="account" placeholder="输入你想用的账号" type="text"/>
<!-- Error State Message (Hidden by default, shown via JS for demonstration) -->
<p class="text-error text-sm mt-1 hidden font-label-bold" id="accountError">
<span class="material-symbols-outlined align-middle text-[16px] mr-1" data-icon="error">error</span>账号已存在，请直接登录
                    </p>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-secondary" for="password">密码</label>
<div class="relative">
<input class="input-tactile bg-surface-container-lowest rounded-lg px-4 py-3 text-on-surface placeholder:text-outline-variant w-full pr-12" id="password" placeholder="设置密码" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors focus:outline-none" onclick="togglePassword('password', 'eyeIcon1')" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off" id="eyeIcon1">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password Input -->
<div class="flex flex-col gap-xs mb-md">
<label class="font-label-bold text-label-bold text-secondary" for="confirmPassword">确认密码</label>
<div class="relative">
<input class="input-tactile bg-surface-container-lowest rounded-lg px-4 py-3 text-on-surface placeholder:text-outline-variant w-full pr-12" id="confirmPassword" placeholder="再次输入密码" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors focus:outline-none" onclick="togglePassword('confirmPassword', 'eyeIcon2')" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off" id="eyeIcon2">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="squishy-btn bg-primary text-on-primary font-label-bold text-label-bold py-4 px-6 rounded-full w-full flex items-center justify-center gap-2 hover:bg-on-primary-fixed-variant" onclick="simulateSubmit()" type="button">
                    下一步
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Link -->
<div class="mt-lg text-center">
<a class="font-label-bold text-label-bold text-secondary hover:text-primary transition-colors underline decoration-outline-variant underline-offset-4" href="#">
                已有账号？去登录
            </a>
</div>
</main>
<script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
                icon.setAttribute('data-icon', 'visibility');
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
                icon.setAttribute('data-icon', 'visibility_off');
            }
        }

        function simulateSubmit() {
            const accountInput = document.getElementById('account').value;
            const errorMsg = document.getElementById('accountError');
            const inputElement = document.getElementById('account');
            
            // Simple simulation: if user types 'exists', show error
            if (accountInput === 'exists' || accountInput === 'admin') {
                errorMsg.classList.remove('hidden');
                inputElement.classList.add('border-error');
                inputElement.classList.remove('border-outline-variant');
            } else {
                errorMsg.classList.add('hidden');
                inputElement.classList.remove('border-error');
                inputElement.classList.add('border-outline-variant');
                // Proceed to next step logic here
            }
        }
    </script>
</body></html>
