<style>
        body {

        /* Animations */

                transform: translateY(0);

        .animate-page-enter {
            animation: slideUpFade 280ms ease-out forwards;

        .card-stagger-1 { animation: slideUpFade 280ms ease-out 40ms forwards; opacity: 0; }
        .card-stagger-2 { animation: slideUpFade 280ms ease-out 80ms forwards; opacity: 0; }

<body class="text-on-background font-body-md antialiased overflow-x-hidden pb-40 animate-page-enter">
<!-- Top App Bar (Transactional - modified for checkout) -->
<header class="sticky top-0 z-40 bg-transparent w-full flex justify-between items-center px-margin-mobile py-sm">
<button class="p-2 text-primary hover:opacity-80 transition-opacity" onclick="history.back()">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_back_ios_new</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary font-bold">确认点菜</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="max-w-md mx-auto px-margin-mobile mt-4 space-y-md relative z-10">
<!-- Emotion Confirmation Card (Top) -->
<section class="bg-white/40 backdrop-blur-xl p-lg rounded-[24px] shadow-[0_8px_32px_rgba(137,76,92,0.05)] border border-white/50 flex items-center justify-between card-stagger-1">
<div class="flex items-center space-x-md">
<div class="w-12 h-12 rounded-full bg-secondary-container/50 overflow-hidden shrink-0 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<div>
<h2 class="font-label-bold text-lg font-bold text-on-surface">今晚这顿安排好啦</h2>
<p class="font-body-md text-sm text-on-surface-variant opacity-80 mt-0.5">预计 20 分钟后享用</p>
</div>
</div>
<span class="bg-primary-container/30 text-primary px-3 py-1 rounded-full text-xs font-bold border border-primary/10">待提交</span>
</section>
<!-- Order Details Card (Middle) -->
<section class="bg-white/60 backdrop-blur-md p-lg rounded-[24px] shadow-sm border border-white/50 space-y-0 card-stagger-2">
<div class="flex justify-between items-center border-b border-primary/10 pb-4 mb-4">
<h3 class="font-label-bold text-label-bold text-on-surface">点单明细</h3>
<span class="font-body-md text-sm text-on-surface-variant">共 4 件</span>
</div>
<div class="space-y-4">
<!-- Item 1 -->
<div class="flex justify-between items-start">
<div>
<p class="font-body-lg text-body-lg text-on-surface font-medium">爱心披萨（双拼）</p>
<p class="font-body-md text-sm text-on-surface-variant mt-1">x1</p>
</div>
<p class="font-body-lg text-body-lg text-on-surface">¥68</p>
</div>
<div class="h-px w-full bg-primary/5"></div>
<!-- Item 2 -->
<div class="flex justify-between items-start">
<div>
<p class="font-body-lg text-body-lg text-on-surface font-medium">招牌草莓蛋糕</p>
<p class="font-body-md text-sm text-on-surface-variant mt-1">x1</p>
</div>
<p class="font-body-lg text-body-lg text-on-surface">¥42</p>
</div>
<div class="h-px w-full bg-primary/5"></div>
<!-- Item 3 -->
<div class="flex justify-between items-start">
<div>
<p class="font-body-lg text-body-lg text-on-surface font-medium">鲜虾寿司卷</p>
<p class="font-body-md text-sm text-on-surface-variant mt-1">x2</p>
</div>
<p class="font-body-lg text-body-lg text-on-surface">¥36</p>
</div>
</div>
<div class="border-t border-primary/10 pt-4 mt-4 space-y-2">
<div class="flex justify-between items-center">
<p class="font-body-md text-on-surface-variant text-sm">商品小计</p>
<p class="font-body-md text-on-surface-variant">¥146</p>
</div>
<div class="flex justify-between items-center">
<p class="font-body-md text-on-surface-variant text-sm">合计</p>
<p class="font-headline-md text-headline-md text-[#ba1a1a] font-bold">¥146</p>
</div>
</div>
</section>
<!-- Remarks Card (Bottom) -->
<section class="bg-white/60 backdrop-blur-md p-lg rounded-[24px] shadow-sm border border-white/50 space-y-4 card-stagger-3">
<div>
<h3 class="font-label-bold text-label-bold text-on-surface">给后厨的悄悄话</h3>
<p class="font-body-md text-xs text-on-surface-variant mt-1">口味、忌口、想说的话都可以写</p>
</div>
<textarea class="w-full bg-white/50 border border-primary-container rounded-[20px] p-4 font-body-md text-on-surface placeholder:text-outline-variant focus:ring-1 focus:ring-primary focus:border-primary transition-all resize-none shadow-inner" id="notes" placeholder="比如少辣、多加葱、今天想吃热一点..." rows="3"></textarea>
</section>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 right-0 p-margin-mobile pb-[calc(20px+env(safe-area-inset-bottom))] bg-gradient-to-t from-background via-background/90 to-transparent z-40">
<div class="max-w-md mx-auto">
<button class="w-full h-[54px] bg-gradient-to-r from-[#ffb1c3] to-[#f8a98e] text-on-primary font-headline-md text-lg py-0 rounded-full flex items-center justify-center space-x-2 transition-transform duration-200 btn-active shadow-lg shadow-primary/20" id="submitBtn">
<span>提交点菜 ❤</span>
</button>
</div>
</div>
<!-- Success Toast (Liquid Glass) -->
<div class="fixed inset-0 z-50 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-500" id="successToast">
<!-- Backdrop blur -->
<div class="absolute inset-0 bg-white/20 backdrop-blur-md"></div>
<!-- Toast Content -->
<div class="relative bg-white/40 border border-white/50 backdrop-blur-xl shadow-[0_8px_32px_rgba(137,76,92,0.15)] rounded-[2rem] p-8 flex flex-col items-center transform scale-90 transition-transform duration-500 ease-out" id="toastBox">
<div class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center mb-4 animate-bounce shadow-inner">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="font-headline-md text-headline-md text-primary font-bold text-center">点菜成功</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-2">已经告诉对方啦～</p>
</div>
</div>
<script>
        const submitBtn = document.getElementById('submitBtn');
        const successToast = document.getElementById('successToast');
        const toastBox = document.getElementById('toastBox');

        submitBtn.addEventListener('click', () => {
            // Simulate submission
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">autorenew</span><span>提交中...</span>';
            
            setTimeout(() => {
                // Show toast
                successToast.classList.remove('opacity-0');
                successToast.classList.add('opacity-100');
                
                toastBox.classList.remove('scale-90');
                toastBox.classList.add('scale-100');

                // Reset button (optional, usually would redirect)
                setTimeout(() => {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span>提交点菜 ❤</span>';
                    
                    // Hide toast after a while
                    setTimeout(() => {
                        successToast.classList.remove('opacity-100');
                        successToast.classList.add('opacity-0');
                        toastBox.classList.remove('scale-100');
                        toastBox.classList.add('scale-90');
                    }, 2500);

                }, 500);

            }, 800);
        });
    </script>
