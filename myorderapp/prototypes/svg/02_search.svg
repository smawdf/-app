<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 800" width="360" height="800">
  <defs>
    <style>
      .title { font-family: -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1a1a1a; }
      .subtitle { font-family: -apple-system, sans-serif; font-size: 14px; font-weight: 500; fill: #666; }
      .body { font-family: -apple-system, sans-serif; font-size: 13px; fill: #333; }
      .label { font-family: -apple-system, sans-serif; font-size: 11px; fill: #999; }
      .tab-text { font-family: -apple-system, sans-serif; font-size: 10px; fill: #999; }
      .tab-active { font-family: -apple-system, sans-serif; font-size: 10px; fill: #FF6B35; font-weight: 600; }
      .chip { font-family: -apple-system, sans-serif; font-size: 11px; fill: #FF6B35; font-weight: 500; }
      .chip-bg { fill: #FFF3E0; stroke: #FF6B35; stroke-width: 0.5; }
    </style>
  </defs>

  <rect x="10" y="10" width="340" height="780" rx="24" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="30" y="42" style="font-family:-apple-system,sans-serif;font-size:11px;fill:#999;">18:41</text>

  <!-- Header with back -->
  <text x="24" y="80" style="font-family:-apple-system,sans-serif;font-size:18px;">←</text>
  <text x="50" y="82" class="title">搜索菜谱</text>

  <!-- Search Bar -->
  <rect x="20" y="96" width="280" height="44" rx="22" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="48" y="123" class="label" style="fill:#bbb;">搜索菜品、食材...</text>
  <rect x="308" y="96" width="44" height="44" rx="22" fill="#FF6B35"/>
  <text x="320" y="124" style="font-family:-apple-system,sans-serif;font-size:16px;fill:#fff;">🔍</text>

  <!-- Filter Chips -->
  <g transform="translate(20, 152)">
    <rect x="0" y="0" width="56" height="28" rx="14" class="chip-bg"/>
    <text x="14" y="18" class="chip">全部</text>

    <rect x="64" y="0" width="56" height="28" rx="14" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="78" y="18" class="chip" style="fill:#666;">中餐</text>

    <rect x="128" y="0" width="56" height="28" rx="14" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="142" y="18" class="chip" style="fill:#666;">西餐</text>

    <rect x="192" y="0" width="56" height="28" rx="14" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="206" y="18" class="chip" style="fill:#666;">甜品</text>

    <rect x="256" y="0" width="64" height="28" rx="14" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="270" y="18" class="chip" style="fill:#666;">饮品</text>
  </g>

  <!-- Hot Searches -->
  <text x="30" y="210" class="subtitle" style="font-weight:600;">🔥 热门搜索</text>
  <g transform="translate(20, 220)">
    <rect x="0" y="0" width="72" height="26" rx="13" fill="#f5f5f5"/>
    <text x="14" y="17" class="label" style="fill:#555;">红烧肉</text>
    <rect x="80" y="0" width="84" height="26" rx="13" fill="#f5f5f5"/>
    <text x="94" y="17" class="label" style="fill:#555;">番茄炒蛋</text>
    <rect x="172" y="0" width="72" height="26" rx="13" fill="#f5f5f5"/>
    <text x="186" y="17" class="label" style="fill:#555;">可乐鸡翅</text>
    <rect x="252" y="0" width="72" height="26" rx="13" fill="#f5f5f5"/>
    <text x="262" y="17" class="label" style="fill:#555;">麻婆豆腐</text>
  </g>

  <!-- Search Results -->
  <text x="30" y="284" class="subtitle" style="font-weight:600;">搜索结果</text>

  <!-- Result Card 1 -->
  <rect x="20" y="296" width="320" height="100" rx="14" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <rect x="30" y="306" width="80" height="80" rx="12" fill="#FFCCBC"/>
  <text x="50" y="354" style="font-family:-apple-system,sans-serif;font-size:30px;">🍲</text>
  <text x="122" y="326" class="body" style="font-weight:600;font-size:14px;">红烧肉</text>
  <text x="122" y="344" class="label">中餐 · 60分钟 · 难度⭐⭐⭐</text>
  <text x="122" y="362" class="label" style="fill:#aaa;">经典家常菜，肥而不腻入口即化</text>
  <rect x="122" y="370" width="48" height="18" rx="9" fill="#E8F5E9"/>
  <text x="130" y="383" style="font-family:-apple-system,sans-serif;font-size:9px;fill:#4CAF50;">Spoonacular</text>

  <!-- Result Card 2 -->
  <rect x="20" y="406" width="320" height="100" rx="14" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <rect x="30" y="416" width="80" height="80" rx="12" fill="#FFF9C4"/>
  <text x="50" y="464" style="font-family:-apple-system,sans-serif;font-size:30px;">🥘</text>
  <text x="122" y="436" class="body" style="font-weight:600;font-size:14px;">东坡肉</text>
  <text x="122" y="454" class="label">中餐 · 120分钟 · 难度⭐⭐⭐⭐</text>
  <text x="122" y="472" class="label" style="fill:#aaa;">苏式经典，色泽红亮软糯香甜</text>
  <rect x="122" y="480" width="48" height="18" rx="9" fill="#E8F5E9"/>
  <text x="130" y="493" style="font-family:-apple-system,sans-serif;font-size:9px;fill:#4CAF50;">Spoonacular</text>

  <!-- Result Card 3 -->
  <rect x="20" y="516" width="320" height="100" rx="14" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <rect x="30" y="526" width="80" height="80" rx="12" fill="#C8E6C9"/>
  <text x="50" y="574" style="font-family:-apple-system,sans-serif;font-size:30px;">🥗</text>
  <text x="122" y="546" class="body" style="font-weight:600;font-size:14px;">红烧狮子头</text>
  <text x="122" y="564" class="label">中餐 · 45分钟 · 难度⭐⭐</text>
  <text x="122" y="582" class="label" style="fill:#aaa;">淮扬名菜，肉质鲜嫩汤汁浓郁</text>
  <rect x="122" y="590" width="60" height="18" rx="9" fill="#FFF3E0"/>
  <text x="130" y="603" style="font-family:-apple-system,sans-serif;font-size:9px;fill:#FF6B35;">聚合数据</text>

  <!-- Bottom Tab Bar -->
  <rect x="10" y="720" width="340" height="70" rx="0" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <text x="40" y="750" style="font-family:-apple-system,sans-serif;font-size:18px;">🏠</text>
  <text x="34" y="766" class="tab-text">首页</text>
  <text x="110" y="750" style="font-family:-apple-system,sans-serif;font-size:18px;">📚</text>
  <text x="102" y="766" class="tab-text">菜品库</text>
  <text x="180" y="750" style="font-family:-apple-system,sans-serif;font-size:18px;">🍽️</text>
  <text x="170" y="766" class="tab-text">点餐</text>
  <text x="248" y="750" style="font-family:-apple-system,sans-serif;font-size:18px;">💫</text>
  <text x="242" y="766" class="tab-text">心愿单</text>
  <text x="310" y="750" style="font-family:-apple-system,sans-serif;font-size:18px;">👤</text>
  <text x="306" y="766" class="tab-text">我的</text>
</svg>
