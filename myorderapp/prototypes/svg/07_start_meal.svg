<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 800" width="360" height="800">
  <defs>
    <style>
      .title { font-family: -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1a1a1a; }
      .body { font-family: -apple-system, sans-serif; font-size: 13px; fill: #333; }
      .label { font-family: -apple-system, sans-serif; font-size: 11px; fill: #999; }
      .tab-text { font-family: -apple-system, sans-serif; font-size: 10px; fill: #999; }
    </style>
  </defs>

  <rect x="10" y="10" width="340" height="780" rx="24" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="30" y="42" class="label">18:41</text>

  <!-- Header -->
  <text x="24" y="46" style="font-family:-apple-system,sans-serif;font-size:14px;fill:#FF6B35;">← 返回</text>
  <text x="130" y="82" class="title" style="font-size:20px;">发起点餐</text>

  <!-- Meal Type Selection -->
  <text x="24" y="120" class="title" style="font-size:14px;">选择餐次</text>
  <g transform="translate(20, 132)">
    <!-- Breakfast -->
    <rect x="0" y="0" width="72" height="72" rx="14" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="22" y="36" style="font-family:-apple-system,sans-serif;font-size:24px;">🌅</text>
    <text x="18" y="58" class="label" style="font-size:10px;">早餐</text>
    <!-- Lunch (selected) -->
    <rect x="82" y="0" width="72" height="72" rx="14" fill="#FF6B35"/>
    <text x="104" y="36" style="font-family:-apple-system,sans-serif;font-size:24px;">☀️</text>
    <text x="100" y="58" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#fff;font-weight:600;">午餐</text>
    <!-- Dinner -->
    <rect x="164" y="0" width="72" height="72" rx="14" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="186" y="36" style="font-family:-apple-system,sans-serif;font-size:24px;">🌙</text>
    <text x="182" y="58" class="label" style="font-size:10px;">晚餐</text>
    <!-- Supper -->
    <rect x="246" y="0" width="72" height="72" rx="14" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="268" y="36" style="font-family:-apple-system,sans-serif;font-size:24px;">🌃</text>
    <text x="268" y="58" class="label" style="font-size:10px;">夜宵</text>
  </g>

  <!-- Partner Status -->
  <rect x="20" y="220" width="320" height="56" rx="14" fill="#E8F5E9"/>
  <text x="40" y="244" style="font-family:-apple-system,sans-serif;font-size:13px;fill:#2E7D32;">👧 小美已加入点餐</text>
  <text x="40" y="262" class="label" style="font-size:10px;">她正在选择中...</text>
  <circle cx="320" cy="248" r="8" fill="#4CAF50"/>
  <text x="317" y="252" style="font-family:-apple-system,sans-serif;font-size:8px;fill:#fff;">✓</text>

  <!-- My Selection Section -->
  <text x="24" y="304" class="title" style="font-size:14px;">🧑 我的选择</text>

  <!-- Selected Dish 1 -->
  <rect x="20" y="316" width="320" height="64" rx="12" fill="#fff" stroke="#FF6B35" stroke-width="1.5"/>
  <rect x="30" y="324" width="48" height="48" rx="10" fill="#FFE0B2"/>
  <text x="42" y="354" style="font-family:-apple-system,sans-serif;font-size:20px;">🍗</text>
  <text x="88" y="344" class="body" style="font-weight:600;">宫保鸡丁</text>
  <text x="88" y="362" class="label">中餐 · 30分钟 · ❤️</text>
  <text x="290" y="350" style="font-family:-apple-system,sans-serif;font-size:18px;color:#ccc;">✕</text>

  <!-- Selected Dish 2 -->
  <rect x="20" y="388" width="320" height="64" rx="12" fill="#fff" stroke="#FF6B35" stroke-width="1.5"/>
  <rect x="30" y="396" width="48" height="48" rx="10" fill="#C8E6C9"/>
  <text x="42" y="426" style="font-family:-apple-system,sans-serif;font-size:20px;">🥗</text>
  <text x="88" y="416" class="body" style="font-weight:600;">凯撒沙拉</text>
  <text x="88" y="434" class="label">西餐 · 15分钟 · 都爱吃</text>
  <text x="290" y="422" style="font-family:-apple-system,sans-serif;font-size:18px;color:#ccc;">✕</text>

  <!-- Add More Button -->
  <rect x="20" y="460" width="320" height="44" rx="12" fill="#fff" stroke="#FF6B35" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="132" y="487" style="font-family:-apple-system,sans-serif;font-size:13px;fill:#FF6B35;font-weight:500;">+ 从菜品库添加更多</text>

  <!-- Quick Add from Recent -->
  <text x="24" y="530" class="title" style="font-size:14px;">⚡ 快速添加</text>
  <g transform="translate(20, 540)">
    <rect x="0" y="0" width="96" height="36" rx="18" fill="#f5f5f5"/>
    <text x="12" y="23" class="body" style="font-size:11px;">🍝 番茄意面</text>
    <rect x="104" y="0" width="96" height="36" rx="18" fill="#f5f5f5"/>
    <text x="116" y="23" class="body" style="font-size:11px;">🍲 红烧肉</text>
    <rect x="208" y="0" width="112" height="36" rx="18" fill="#f5f5f5"/>
    <text x="220" y="23" class="body" style="font-size:11px;">🥘 可乐鸡翅</text>
  </g>

  <!-- Bottom Action -->
  <rect x="20" y="730" width="320" height="48" rx="24" fill="#FF6B35"/>
  <text x="120" y="759" style="font-family:-apple-system,sans-serif;font-size:15px;fill:#fff;font-weight:700;">提交我的选择 (2道)</text>
</svg>
