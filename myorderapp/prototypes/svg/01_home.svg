<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 800" width="360" height="800">
  <defs>
    <style>
      .title { font-family: -apple-system, sans-serif; font-size: 20px; font-weight: 700; fill: #1a1a1a; }
      .subtitle { font-family: -apple-system, sans-serif; font-size: 14px; font-weight: 500; fill: #666; }
      .body { font-family: -apple-system, sans-serif; font-size: 13px; fill: #333; }
      .label { font-family: -apple-system, sans-serif; font-size: 11px; fill: #999; }
      .tab-text { font-family: -apple-system, sans-serif; font-size: 10px; fill: #999; }
      .tab-active { font-family: -apple-system, sans-serif; font-size: 10px; fill: #FF6B35; font-weight: 600; }
      .badge { font-family: -apple-system, sans-serif; font-size: 10px; fill: #fff; font-weight: 600; }
    </style>
  </defs>

  <!-- Phone Frame -->
  <rect x="10" y="10" width="340" height="780" rx="24" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>

  <!-- Status Bar -->
  <text x="30" y="42" class="label">18:41</text>
  <rect x="280" y="30" width="50" height="14" rx="4" fill="#e0e0e0"/>
  <text x="285" y="41" class="label">100%</text>

  <!-- Header -->
  <rect x="20" y="56" width="320" height="48" rx="0" fill="transparent"/>
  <text x="30" y="84" class="title" style="font-size:22px;">myorderapp</text>
  <circle cx="330" cy="76" r="16" fill="#FFF3E0"/>
  <text x="322" y="81" class="body" style="font-size:14px;">🔔</text>

  <!-- Today Status Card -->
  <rect x="20" y="116" width="320" height="100" rx="16" fill="#FF6B35"/>
  <text x="36" y="146" style="font-family:-apple-system,sans-serif;font-size:13px;fill:rgba(255,255,255,0.8);">今天 · 午餐</text>
  <text x="36" y="172" style="font-family:-apple-system,sans-serif;font-size:20px;fill:#fff;font-weight:700;">还没有点餐哦 🍽️</text>
  <rect x="36" y="184" width="100" height="24" rx="12" fill="rgba(255,255,255,0.25)"/>
  <text x="52" y="200" style="font-family:-apple-system,sans-serif;font-size:11px;fill:#fff;font-weight:600;">发起点餐 →</text>

  <!-- Quick Actions -->
  <text x="30" y="248" class="subtitle" style="font-weight:600;">快捷操作</text>
  <g>
    <rect x="20" y="260" width="96" height="80" rx="14" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
    <text x="52" y="300" style="font-family:-apple-system,sans-serif;font-size:28px;">🔍</text>
    <text x="42" y="326" class="label" style="font-size:11px;">搜菜谱</text>
  </g>
  <g>
    <rect x="132" y="260" width="96" height="80" rx="14" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
    <text x="164" y="300" style="font-family:-apple-system,sans-serif;font-size:28px;">🎲</text>
    <text x="152" y="326" class="label" style="font-size:11px;">随机推荐</text>
  </g>
  <g>
    <rect x="244" y="260" width="96" height="80" rx="14" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
    <text x="276" y="300" style="font-family:-apple-system,sans-serif;font-size:28px;">➕</text>
    <text x="262" y="326" class="label" style="font-size:11px;">添加菜品</text>
  </g>

  <!-- Recent Dishes -->
  <text x="30" y="374" class="subtitle" style="font-weight:600;">最近吃过</text>

  <!-- Dish Card 1 -->
  <rect x="20" y="386" width="320" height="72" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <rect x="32" y="396" width="52" height="52" rx="10" fill="#FFE0B2"/>
  <text x="42" y="428" style="font-family:-apple-system,sans-serif;font-size:22px;">🍗</text>
  <text x="96" y="416" class="body" style="font-weight:600;">宫保鸡丁</text>
  <text x="96" y="434" class="label">中餐 · 难度⭐⭐ · 30分钟</text>
  <text x="280" y="422" style="font-family:-apple-system,sans-serif;font-size:11px;fill:#FF6B35;">❤️ 都爱吃</text>

  <!-- Dish Card 2 -->
  <rect x="20" y="466" width="320" height="72" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <rect x="32" y="476" width="52" height="52" rx="10" fill="#C8E6C9"/>
  <text x="42" y="508" style="font-family:-apple-system,sans-serif;font-size:22px;">🥗</text>
  <text x="96" y="496" class="body" style="font-weight:600;">凯撒沙拉</text>
  <text x="96" y="514" class="label">西餐 · 难度⭐ · 15分钟</text>
  <text x="280" y="502" style="font-family:-apple-system,sans-serif;font-size:11px;fill:#4CAF50;">⭐ 她爱吃</text>

  <!-- Dish Card 3 -->
  <rect x="20" y="546" width="320" height="72" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <rect x="32" y="556" width="52" height="52" rx="10" fill="#F3E5F5"/>
  <text x="42" y="588" style="font-family:-apple-system,sans-serif;font-size:22px;">🍝</text>
  <text x="96" y="576" class="body" style="font-weight:600;">番茄意面</text>
  <text x="96" y="594" class="label">西餐 · 难度⭐⭐ · 25分钟</text>
  <text x="280" y="582" style="font-family:-apple-system,sans-serif;font-size:11px;fill:#FF6B35;">❤️ 都爱吃</text>

  <!-- Bottom Tab Bar -->
  <rect x="10" y="720" width="340" height="70" rx="0" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <g>
    <text x="40" y="750" style="font-family:-apple-system,sans-serif;font-size:18px;">🏠</text>
    <text x="34" y="766" class="tab-active">首页</text>
  </g>
  <g>
    <text x="110" y="750" style="font-family:-apple-system,sans-serif;font-size:18px;">📚</text>
    <text x="102" y="766" class="tab-text">菜品库</text>
  </g>
  <g>
    <text x="180" y="750" style="font-family:-apple-system,sans-serif;font-size:18px;">🍽️</text>
    <text x="170" y="766" class="tab-text">点餐</text>
  </g>
  <g>
    <text x="248" y="750" style="font-family:-apple-system,sans-serif;font-size:18px;">💫</text>
    <text x="242" y="766" class="tab-text">心愿单</text>
  </g>
  <g>
    <text x="310" y="750" style="font-family:-apple-system,sans-serif;font-size:18px;">👤</text>
    <text x="306" y="766" class="tab-text">我的</text>
  </g>
</svg>
