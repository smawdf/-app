  <rect x="30" y="340" width="56" height="56" rx="10" fill="#E8F5E9"/>
  <text x="38" y="374" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#4CAF50;font-weight:600;">5月2日</text>
  <text x="42" y="386" style="font-family:-apple-system,sans-serif;font-size:9px;fill:#4CAF50;">午餐</text>
  <text x="96" y="358" class="body" style="font-weight:600;">宫保鸡丁 + 凯撒沙拉</text>
  <text x="96" y="376" class="label">你选了2道 · 小美选了1道</text>
  <text x="96" y="392" class="label" style="font-size:10px;">⭐ 宫保鸡丁是第3次点</text>

  <!-- History Item 2 -->
  <rect x="20" y="418" width="320" height="80" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <rect x="30" y="428" width="56" height="56" rx="10" fill="#FFF3E0"/>
  <text x="38" y="462" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#FF6B35;font-weight:600;">5月1日</text>
  <text x="42" y="474" style="font-family:-apple-system,sans-serif;font-size:9px;fill:#FF6B35;">晚餐</text>
  <text x="96" y="446" class="body" style="font-weight:600;">红烧肉 + 番茄意面</text>
