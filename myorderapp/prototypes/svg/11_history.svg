  <text x="24" y="614" class="title" style="font-size:14px;">🏆 最爱菜品 Top 5</text>
  <g transform="translate(20, 626)">
    <rect x="0" y="0" width="320" height="28" rx="8" fill="#fff" stroke="#f0f0f0" stroke-width="0.5"/>
    <text x="12" y="19" style="font-family:-apple-system,sans-serif;font-size:11px;fill:#FF6B35;font-weight:700;">🥇</text>
    <text x="32" y="19" class="body" style="font-size:12px;">宫保鸡丁</text>
