    <text x="32" y="53" class="body" style="font-size:12px;">红烧肉</text>
    <text x="260" y="53" class="label">点了 6 次</text>

    <rect x="0" y="68" width="320" height="28" rx="8" fill="#fff" stroke="#f0f0f0" stroke-width="0.5"/>
