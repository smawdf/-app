  <!-- History Item 3 -->
  <rect x="20" y="506" width="320" height="80" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <rect x="30" y="516" width="56" height="56" rx="10" fill="#F3E5F5"/>
  <text x="38" y="550" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#9C27B0;font-weight:600;">4月30日</text>
  <text x="42" y="562" style="font-family:-apple-system,sans-serif;font-size:9px;fill:#9C27B0;">晚餐</text>
  <text x="96" y="534" class="body" style="font-weight:600;">可乐鸡翅 + 日式拉面</text>
