<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 800" width="360" height="800">
  <defs>
    <style>
      .title { font-family: -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1a1a1a; }
      .body { font-family: -apple-system, sans-serif; font-size: 13px; fill: #333; }
      .label { font-family: -apple-system, sans-serif; font-size: 11px; fill: #999; }
      .tab-text { font-family: -apple-system, sans-serif; font-size: 10px; fill: #999; }
      .tab-active { font-family: -apple-system, sans-serif; font-size: 10px; fill: #FF6B35; font-weight: 600; }
      .stat-num { font-family: -apple-system, sans-serif; font-size: 20px; fill: #FF6B35; font-weight: 700; }
    </style>
  </defs>

  <rect x="10" y="10" width="340" height="780" rx="24" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="30" y="42" class="label">18:41</text>

  <!-- Header -->
  <text x="30" y="80" class="title" style="font-size:22px;">📊 历史记录</text>

  <!-- View Toggle -->
  <g transform="translate(200, 62)">
    <rect x="0" y="0" width="60" height="28" rx="14" fill="#FFF3E0" stroke="#FF6B35" stroke-width="0.5"/>
    <text x="14" y="19" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#FF6B35;font-weight:600;">📅 日历</text>
    <rect x="68" y="0" width="60" height="28" rx="14" fill="#f5f5f5"/>
    <text x="82" y="19" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#666;">📋 列表</text>
  </g>

  <!-- Stats Cards -->
  <g transform="translate(20, 96)">
    <rect x="0" y="0" width="100" height="72" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
    <text x="36" y="28" class="stat-num">28</text>
    <text x="20" y="48" class="label" style="font-size:10px;">总点餐次数</text>
    <text x="28" y="62" class="label" style="font-size:9px;">本月</text>

    <rect x="110" y="0" width="100" height="72" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
    <text x="40" y="28" class="stat-num">12</text>
    <text x="18" y="48" class="label" style="font-size:10px;">尝试新菜品</text>
    <text x="28" y="62" class="label" style="font-size:9px;">本月</text>

    <rect x="220" y="0" width="100" height="72" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
    <text x="34" y="28" class="stat-num">8</text>
    <text x="22" y="48" class="label" style="font-size:10px;">连续点餐天</text>
    <text x="28" y="62" class="label" style="font-size:9px;">当前</text>
  </g>

  <!-- Mini Calendar -->
  <text x="24" y="196" class="title" style="font-size:14px;">2026年5月</text>
  <g transform="translate(20, 208)">
    <!-- Day headers -->
    <text x="8" y="0" class="label" style="font-size:9px;">一</text>
    <text x="54" y="0" class="label" style="font-size:9px;">二</text>
    <text x="100" y="0" class="label" style="font-size:9px;">三</text>
    <text x="146" y="0" class="label" style="font-size:9px;">四</text>
    <text x="192" y="0" class="label" style="font-size:9px;">五</text>
    <text x="238" y="0" class="label" style="font-size:9px;">六</text>
    <text x="284" y="0" class="label" style="font-size:9px;">日</text>
    <!-- Week 1 -->
    <text x="12" y="24" class="label">28</text>
    <text x="58" y="24" class="label">29</text>
    <text x="104" y="24" class="label">30</text>
    <circle cx="152" cy="20" r="12" fill="#FFF3E0"/>
    <text x="148" y="24" style="font-family:-apple-system,sans-serif;font-size:11px;fill:#FF6B35;font-weight:600;">1</text>
    <circle cx="198" cy="20" r="12" fill="#FFF3E0"/>
    <text x="194" y="24" style="font-family:-apple-system,sans-serif;font-size:11px;fill:#FF6B35;font-weight:600;">2</text>
    <circle cx="244" cy="20" r="12" fill="#FF6B35"/>
    <text x="240" y="24" style="font-family:-apple-system,sans-serif;font-size:11px;fill:#fff;font-weight:700;">3</text>
    <text x="290" y="24" class="label">4</text>
    <!-- More days... -->
  </g>

