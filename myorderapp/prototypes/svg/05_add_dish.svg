<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 800" width="360" height="800">
  <defs>
    <style>
      .title { font-family: -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1a1a1a; }
      .body { font-family: -apple-system, sans-serif; font-size: 13px; fill: #333; }
      .label { font-family: -apple-system, sans-serif; font-size: 11px; fill: #999; }
      .input-label { font-family: -apple-system, sans-serif; font-size: 12px; fill: #666; font-weight: 500; }
      .input-box { fill: #fff; stroke: #e0e0e0; stroke-width: 1; }
      .btn-primary { fill: #FF6B35; }
      .btn-text { font-family: -apple-system, sans-serif; font-size: 14px; fill: #fff; font-weight: 600; }
    </style>
  </defs>

  <rect x="10" y="10" width="340" height="780" rx="24" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>

  <!-- Header -->
  <text x="24" y="46" style="font-family:-apple-system,sans-serif;font-size:14px;fill:#FF6B35;">取消</text>
  <text x="140" y="46" class="title">添加菜品</text>
  <text x="300" y="46" style="font-family:-apple-system,sans-serif;font-size:14px;fill:#FF6B35;font-weight:600;">保存</text>

  <!-- Image Upload -->
  <rect x="20" y="62" width="320" height="140" rx="16" fill="#f5f0ea" stroke="#e0d8cf" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="148" y="128" style="font-family:-apple-system,sans-serif;font-size:32px;">📷</text>
  <text x="126" y="156" class="label">点击上传展示图</text>
  <text x="110" y="172" class="label" style="font-size:10px;">拍照 / 从相册选择 / 输入URL</text>

  <!-- Basic Info -->
  <text x="24" y="230" class="input-label">菜品名称 *</text>
  <rect x="24" y="238" width="312" height="40" rx="10" class="input-box"/>
  <text x="36" y="263" class="label">输入菜品名称</text>

  <!-- Category & Difficulty Row -->
  <g transform="translate(24, 290)">
    <text x="0" y="0" class="input-label">分类</text>
    <rect x="0" y="8" width="148" height="36" rx="10" class="input-box"/>
    <text x="12" y="31" class="body" style="font-size:12px;">中餐 ▾</text>

    <text x="164" y="0" class="input-label">难度</text>
    <rect x="164" y="8" width="148" height="36" rx="10" class="input-box"/>
    <text x="176" y="31" class="body" style="font-size:12px;">⭐⭐ (中等) ▾</text>
  </g>

  <!-- Cook Time & Servings Row -->
  <g transform="translate(24, 346)">
    <text x="0" y="0" class="input-label">烹饪时间（分钟）</text>
    <rect x="0" y="8" width="148" height="36" rx="10" class="input-box"/>
    <text x="12" y="31" class="body" style="font-size:12px;">30</text>

    <text x="164" y="0" class="input-label">份量</text>
    <rect x="164" y="8" width="148" height="36" rx="10" class="input-box"/>
    <text x="176" y="31" class="body" style="font-size:12px;">2人份</text>
  </g>

  <!-- Who Likes -->
  <text x="24" y="414" class="input-label">谁爱吃</text>
  <g transform="translate(24, 422)">
    <rect x="0" y="0" width="100" height="32" rx="16" fill="#FFF3E0" stroke="#FF6B35" stroke-width="1"/>
    <text x="20" y="21" style="font-family:-apple-system,sans-serif;font-size:11px;fill:#FF6B35;">🧑 我</text>
    <rect x="108" y="0" width="100" height="32" rx="16" fill="#FFF3E0" stroke="#FF6B35" stroke-width="1"/>
    <text x="128" y="21" style="font-family:-apple-system,sans-serif;font-size:11px;fill:#FF6B35;">👧 她</text>
  </g>

  <!-- Ingredients -->
  <text x="24" y="482" class="input-label">食材清单</text>
  <rect x="24" y="490" width="272" height="36" rx="10" class="input-box"/>
  <text x="36" y="513" class="label">输入食材名称</text>
  <rect x="304" y="490" width="32" height="36" rx="10" fill="#FF6B35"/>
  <text x="313" y="514" style="font-family:-apple-system,sans-serif;font-size:16px;fill:#fff;">+</text>

  <!-- Ingredient tags -->
  <g transform="translate(24, 534)">
    <rect x="0" y="0" width="80" height="26" rx="13" fill="#f5f5f5"/>
    <text x="10" y="17" style="font-family:-apple-system,sans-serif;font-size:11px;fill:#555;">鸡胸肉 300g ✕</text>
    <rect x="88" y="0" width="64" height="26" rx="13" fill="#f5f5f5"/>
    <text x="98" y="17" style="font-family:-apple-system,sans-serif;font-size:11px;fill:#555;">花生米 ✕</text>
    <rect x="160" y="0" width="64" height="26" rx="13" fill="#f5f5f5"/>
    <text x="170" y="17" style="font-family:-apple-system,sans-serif;font-size:11px;fill:#555;">干辣椒 ✕</text>
  </g>

  <!-- Cook Steps Editor -->
  <text x="24" y="592" class="input-label">制作步骤</text>

  <!-- Step 1 -->
  <rect x="24" y="600" width="312" height="80" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <circle cx="44" cy="616" r="10" fill="#FF6B35"/>
  <text x="40" y="620" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#fff;font-weight:700;">1</text>
  <rect x="60" y="608" width="200" height="28" rx="8" fill="#fafafa" stroke="#eee" stroke-width="0.5"/>
  <text x="68" y="626" class="label">描述这一步的操作...</text>
  <rect x="268" y="608" width="28" height="28" rx="8" fill="#f5f5f5"/>
  <text x="274" y="626" style="font-family:-apple-system,sans-serif;font-size:12px;">📷</text>
  <rect x="300" y="608" width="28" height="28" rx="8" fill="#FFEBEE"/>
  <text x="307" y="626" style="font-family:-apple-system,sans-serif;font-size:12px;">🗑</text>

  <!-- Step 2 -->
  <rect x="24" y="688" width="312" height="80" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <circle cx="44" cy="704" r="10" fill="#FF6B35"/>
  <text x="40" y="708" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#fff;font-weight:700;">2</text>
  <rect x="60" y="696" width="200" height="28" rx="8" fill="#fafafa" stroke="#eee" stroke-width="0.5"/>
  <text x="68" y="714" class="label">描述这一步的操作...</text>
  <rect x="268" y="696" width="28" height="28" rx="8" fill="#f5f5f5"/>
  <text x="274" y="714" style="font-family:-apple-system,sans-serif;font-size:12px;">📷</text>
  <rect x="300" y="696" width="28" height="28" rx="8" fill="#FFEBEE"/>
  <text x="307" y="714" style="font-family:-apple-system,sans-serif;font-size:12px;">🗑</text>

  <!-- Add Step Button -->
  <rect x="24" y="776" width="312" height="36" rx="12" fill="#fff" stroke="#FF6B35" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="130" y="799" style="font-family:-apple-system,sans-serif;font-size:12px;fill:#FF6B35;font-weight:500;">+ 添加步骤</text>
</svg>
