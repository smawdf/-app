<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 800" width="360" height="800">
  <defs>
    <style>
      .title { font-family: -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1a1a1a; }
      .body { font-family: -apple-system, sans-serif; font-size: 13px; fill: #333; }
      .label { font-family: -apple-system, sans-serif; font-size: 11px; fill: #999; }
      .step-num { font-family: -apple-system, sans-serif; font-size: 12px; fill: #fff; font-weight: 700; }
      .step-text { font-family: -apple-system, sans-serif; font-size: 12px; fill: #333; }
    </style>
  </defs>

  <rect x="10" y="10" width="340" height="780" rx="24" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>

  <!-- Hero Image -->
  <rect x="10" y="10" width="340" height="240" rx="24" fill="#FFCCBC"/>
  <text x="130" y="140" style="font-family:-apple-system,sans-serif;font-size:60px;">🍲</text>
  <!-- Back button -->
  <circle cx="40" cy="40" r="16" fill="rgba(0,0,0,0.3)"/>
  <text x="33" y="46" style="font-family:-apple-system,sans-serif;font-size:14px;fill:#fff;">←</text>
  <!-- Favorite button -->
  <circle cx="320" cy="40" r="16" fill="rgba(0,0,0,0.3)"/>
  <text x="312" y="46" style="font-family:-apple-system,sans-serif;font-size:14px;">🤍</text>
  <!-- Share button -->
  <circle cx="320" cy="80" r="16" fill="rgba(0,0,0,0.3)"/>
  <text x="312" y="86" style="font-family:-apple-system,sans-serif;font-size:14px;">↗️</text>

  <!-- Title & Meta -->
  <text x="24" y="282" class="title" style="font-size:22px;">红烧肉</text>
  <text x="24" y="302" class="label" style="font-size:12px;">中餐 · 来自 Spoonacular</text>

  <!-- Tags Row -->
  <g transform="translate(24, 312)">
    <rect x="0" y="0" width="64" height="24" rx="12" fill="#FFF3E0"/>
    <text x="12" y="16" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#FF6B35;font-weight:600;">⏱ 60分钟</text>
    <rect x="72" y="0" width="64" height="24" rx="12" fill="#FFF3E0"/>
    <text x="84" y="16" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#FF6B35;font-weight:600;">⭐⭐⭐ 难度</text>
    <rect x="144" y="0" width="56" height="24" rx="12" fill="#E8F5E9"/>
    <text x="156" y="16" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#4CAF50;font-weight:600;">4人份</text>
  </g>

  <!-- Ingredients Section -->
  <text x="24" y="368" class="title" style="font-size:16px;">🥬 食材清单</text>
  <rect x="24" y="378" width="312" height="130" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <g transform="translate(36, 394)">
    <text x="0" y="0" class="body" style="font-size:12px;">• 五花肉 500g</text>
    <text x="160" y="0" class="body" style="font-size:12px;">• 生抽 2勺</text>
    <text x="0" y="22" class="body" style="font-size:12px;">• 老抽 1勺</text>
    <text x="160" y="22" class="body" style="font-size:12px;">• 料酒 2勺</text>
    <text x="0" y="44" class="body" style="font-size:12px;">• 冰糖 30g</text>
    <text x="160" y="44" class="body" style="font-size:12px;">• 八角 2颗</text>
    <text x="0" y="66" class="body" style="font-size:12px;">• 桂皮 1小块</text>
    <text x="160" y="66" class="body" style="font-size:12px;">• 姜片 3片</text>
    <text x="0" y="88" class="body" style="font-size:12px;">• 葱段 适量</text>
  </g>

  <!-- Cook Steps Section -->
  <text x="24" y="536" class="title" style="font-size:16px;">👨‍🍳 制作步骤</text>

  <!-- Step 1 -->
  <rect x="24" y="548" width="312" height="56" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <circle cx="48" cy="576" r="12" fill="#FF6B35"/>
  <text x="43" y="580" class="step-num">1</text>
  <text x="68" y="570" class="step-text">五花肉切块，冷水下锅焯水，去除血沫</text>
  <text x="68" y="588" class="label">焯水后捞出沥干备用</text>

  <!-- Step 2 -->
  <rect x="24" y="612" width="312" height="56" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <circle cx="48" cy="640" r="12" fill="#FF6B35"/>
  <text x="43" y="644" class="step-num">2</text>
  <text x="68" y="634" class="step-text">锅中放少许油，下冰糖小火炒至焦糖色</text>
  <text x="68" y="652" class="label">注意火候，不要炒糊</text>

  <!-- Step 3 -->
  <rect x="24" y="676" width="312" height="56" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <circle cx="48" cy="704" r="12" fill="#FF6B35"/>
  <text x="43" y="708" class="step-num">3</text>
  <text x="68" y="698" class="step-text">放入五花肉翻炒上色，加料酒、生抽、老抽</text>
  <text x="68" y="716" class="label">翻炒均匀让每块肉都上色</text>

  <!-- Action Buttons -->
  <rect x="24" y="744" width="148" height="40" rx="20" fill="#FF6B35"/>
  <text x="60" y="768" style="font-family:-apple-system,sans-serif;font-size:13px;fill:#fff;font-weight:600;">📥 加入菜品库</text>
  <rect x="180" y="744" width="156" height="40" rx="20" fill="#fff" stroke="#FF6B35" stroke-width="1.5"/>
  <text x="212" y="768" style="font-family:-apple-system,sans-serif;font-size:13px;fill:#FF6B35;font-weight:600;">💫 加入心愿单</text>
</svg>
