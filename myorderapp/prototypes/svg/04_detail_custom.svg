<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 800" width="360" height="800">
  <defs>
    <style>
      .title { font-family: -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1a1a1a; }
      .body { font-family: -apple-system, sans-serif; font-size: 13px; fill: #333; }
      .label { font-family: -apple-system, sans-serif; font-size: 11px; fill: #999; }
      .step-num { font-family: -apple-system, sans-serif; font-size: 12px; fill: #fff; font-weight: 700; }
      .step-text { font-family: -apple-system, sans-serif; font-size: 12px; fill: #333; }
    </style>
  </defs>

  <rect x="10" y="10" width="340" height="780" rx="24" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>

  <!-- Hero Image -->
  <rect x="10" y="10" width="340" height="220" rx="24" fill="#FFE0B2"/>
  <text x="140" y="130" style="font-family:-apple-system,sans-serif;font-size:56px;">🍗</text>
  <circle cx="40" cy="40" r="16" fill="rgba(0,0,0,0.3)"/>
  <text x="33" y="46" style="font-family:-apple-system,sans-serif;font-size:14px;fill:#fff;">←</text>
  <circle cx="320" cy="40" r="16" fill="rgba(0,0,0,0.3)"/>
  <text x="313" y="46" style="font-family:-apple-system,sans-serif;font-size:14px;">✏️</text>
  <!-- Custom badge -->
  <rect x="24" y="190" width="56" height="20" rx="10" fill="#FF6B35"/>
  <text x="34" y="204" style="font-family:-apple-system,sans-serif;font-size:9px;fill:#fff;font-weight:600;">自定义</text>

  <!-- Title -->
  <text x="24" y="260" class="title" style="font-size:22px;">宫保鸡丁</text>
  <text x="24" y="280" class="label">你创建 · 2026-04-28</text>

  <!-- Tags -->
  <g transform="translate(24, 290)">
    <rect x="0" y="0" width="64" height="24" rx="12" fill="#FFF3E0"/>
    <text x="12" y="16" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#FF6B35;font-weight:600;">⏱ 30分钟</text>
    <rect x="72" y="0" width="56" height="24" rx="12" fill="#FFF3E0"/>
    <text x="84" y="16" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#FF6B35;font-weight:600;">⭐⭐ 难度</text>
    <rect x="136" y="0" width="64" height="24" rx="12" fill="#E8F5E9"/>
    <text x="148" y="16" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#4CAF50;font-weight:600;">❤️ 都爱吃</text>
  </g>

  <!-- Ingredients -->
  <text x="24" y="342" class="title" style="font-size:16px;">🥬 食材清单</text>
  <rect x="24" y="352" width="312" height="110" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <g transform="translate(36, 368)">
    <text x="0" y="0" class="body" style="font-size:12px;">• 鸡胸肉 300g</text>
    <text x="160" y="0" class="body" style="font-size:12px;">• 花生米 50g</text>
    <text x="0" y="22" class="body" style="font-size:12px;">• 干辣椒 8个</text>
    <text x="160" y="22" class="body" style="font-size:12px;">• 花椒 1小把</text>
    <text x="0" y="44" class="body" style="font-size:12px;">• 葱姜蒜 适量</text>
    <text x="160" y="44" class="body" style="font-size:12px;">• 醋 1勺</text>
    <text x="0" y="66" class="body" style="font-size:12px;">• 生抽 2勺</text>
    <text x="160" y="66" class="body" style="font-size:12px;">• 白糖 1勺</text>
  </g>

  <!-- Cook Steps -->
  <text x="24" y="490" class="title" style="font-size:16px;">👨‍🍳 制作步骤</text>

  <rect x="24" y="502" width="312" height="50" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <circle cx="48" cy="527" r="12" fill="#FF6B35"/>
  <text x="43" y="531" class="step-num">1</text>
  <text x="68" y="521" class="step-text">鸡胸肉切丁，加料酒、生抽腌制15分钟</text>
  <text x="68" y="539" class="label">可以加少许淀粉让肉更嫩</text>

  <rect x="24" y="560" width="312" height="50" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <circle cx="48" cy="585" r="12" fill="#FF6B35"/>
  <text x="43" y="589" class="step-num">2</text>
  <text x="68" y="579" class="step-text">调碗汁：醋、生抽、白糖、淀粉、水拌匀</text>
  <text x="68" y="597" class="label">糖醋比例 1:1 口感最佳</text>

  <rect x="24" y="618" width="312" height="50" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <circle cx="48" cy="643" r="12" fill="#FF6B35"/>
  <text x="43" y="647" class="step-num">3</text>
  <text x="68" y="637" class="step-text">热油炒鸡丁至变色盛出，爆香辣椒花椒</text>
  <text x="68" y="655" class="label">花生米最后放保持酥脆</text>

  <rect x="24" y="676" width="312" height="50" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <circle cx="48" cy="701" r="12" fill="#FF6B35"/>
  <text x="43" y="705" class="step-num">4</text>
  <text x="68" y="695" class="step-text">回锅鸡丁，倒入碗汁翻炒，加花生米出锅</text>
  <text x="68" y="713" class="label">大火快速翻炒，保持鸡丁嫩滑</text>

  <!-- Notes -->
  <rect x="24" y="736" width="312" height="32" rx="12" fill="#FFF8E1"/>
  <text x="36" y="756" style="font-family:-apple-system,sans-serif;font-size:11px;fill:#F9A825;">💡 备注：她不太能吃辣，少放干辣椒</text>
</svg>
