<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 800" width="360" height="800">
  <defs>
    <style>
      .title { font-family: -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1a1a1a; }
      .body { font-family: -apple-system, sans-serif; font-size: 13px; fill: #333; }
      .label { font-family: -apple-system, sans-serif; font-size: 11px; fill: #999; }
      .tab-text { font-family: -apple-system, sans-serif; font-size: 10px; fill: #999; }
      .tab-active { font-family: -apple-system, sans-serif; font-size: 10px; fill: #FF6B35; font-weight: 600; }
      .section-title { font-family: -apple-system, sans-serif; font-size: 12px; fill: #999; font-weight: 500; }
    </style>
  </defs>

  <rect x="10" y="10" width="340" height="780" rx="24" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="30" y="42" class="label">18:41</text>

  <!-- Header -->
  <text x="30" y="80" class="title" style="font-size:22px;">我的</text>

  <!-- Profile Card -->
  <rect x="20" y="96" width="320" height="100" rx="16" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <circle cx="64" cy="146" r="30" fill="#FFE0B2"/>
  <text x="48" y="154" style="font-family:-apple-system,sans-serif;font-size:24px;">🧑</text>
  <text x="106" y="134" class="title" style="font-size:16px;">小明</text>
  <text x="106" y="152" class="label">和小美是一对 💕</text>
  <text x="106" y="170" class="label" style="font-size:10px;">已配对 · 同步正常 ✅</text>
  <text x="290" y="146" style="font-family:-apple-system,sans-serif;font-size:16px;">›</text>

  <!-- Taste Preferences Section -->
  <text x="24" y="224" class="section-title">口味偏好</text>
  <rect x="20" y="234" width="320" height="120" rx="14" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <g transform="translate(32, 250)">
    <!-- Preference toggles -->
    <rect x="0" y="0" width="64" height="28" rx="14" fill="#FFF3E0" stroke="#FF6B35" stroke-width="0.5"/>
    <text x="14" y="19" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#FF6B35;font-weight:500;">🌶 重辣</text>

    <rect x="72" y="0" width="64" height="28" rx="14" fill="#f5f5f5"/>
    <text x="86" y="19" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#666;">🍬 甜口</text>

    <rect x="144" y="0" width="64" height="28" rx="14" fill="#FFF3E0" stroke="#FF6B35" stroke-width="0.5"/>
    <text x="158" y="19" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#FF6B35;font-weight:500;">🧂 重口</text>

    <rect x="216" y="0" width="72" height="28" rx="14" fill="#f5f5f5"/>
    <text x="230" y="19" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#666;">🥬 清淡</text>

    <rect x="0" y="36" width="64" height="28" rx="14" fill="#f5f5f5"/>
    <text x="14" y="55" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#666;">🍋 酸口</text>

    <rect x="72" y="36" width="72" height="28" rx="14" fill="#FFF3E0" stroke="#FF6B35" stroke-width="0.5"/>
    <text x="86" y="55" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#FF6B35;font-weight:500;">🥩 肉食</text>

    <rect x="152" y="36" width="64" height="28" rx="14" fill="#f5f5f5"/>
    <text x="166" y="55" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#666;">🐟 海鲜</text>
  </g>

  <!-- Allergies Section -->
  <text x="24" y="380" class="section-title">忌口管理</text>
  <rect x="20" y="390" width="320" height="52" rx="14" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <g transform="translate(32, 406)">
    <rect x="0" y="0" width="80" height="24" rx="12" fill="#FFEBEE"/>
    <text x="12" y="16" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#E53935;">🥜 花生过敏</text>
    <rect x="88" y="0" width="56" height="24" rx="12" fill="#FFEBEE"/>
    <text x="100" y="16" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#E53935;">🦐 虾过敏</text>
    <rect x="152" y="0" width="48" height="24" rx="12" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,2"/>
    <text x="162" y="16" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#bbb;">+ 添加</text>
  </g>

  <!-- Pairing Section -->
  <text x="24" y="468" class="section-title">配对管理</text>
  <rect x="20" y="478" width="320" height="80" rx="14" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <circle cx="52" cy="518" r="20" fill="#E8F5E9"/>
  <text x="42" y="524" style="font-family:-apple-system,sans-serif;font-size:16px;">👧</text>
  <text x="82" y="510" class="body" style="font-weight:600;">小美</text>
  <text x="82" y="528" class="label">已配对 · 在线 🟢</text>
  <rect x="260" y="504" width="68" height="28" rx="14" fill="#f5f5f5"/>
  <text x="272" y="523" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#666;">解除配对</text>

  <!-- Sync Status -->
  <text x="24" y="584" class="section-title">同步状态</text>
  <rect x="20" y="594" width="320" height="52" rx="14" fill="#E8F5E9"/>
  <text x="36" y="616" style="font-family:-apple-system,sans-serif;font-size:13px;fill:#2E7D32;">✅ Supabase 已连接</text>
  <text x="36" y="634" class="label" style="font-size:10px;">最后同步：2分钟前 · 数据库版本 v12</text>

  <!-- Settings List -->
  <text x="24" y="672" class="section-title">更多设置</text>
  <rect x="20" y="682" width="320" height="44" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="0.5"/>
  <text x="36" y="708" class="body">📤 导出数据</text>
  <text x="300" y="708" class="label">›</text>

  <rect x="20" y="730" width="320" height="44" rx="12" fill="#fff" stroke="#f0f0f0" stroke-width="0.5"/>
  <text x="36" y="756" class="body">ℹ️ 关于 myorderapp</text>
  <text x="300" y="756" class="label">›</text>

  <!-- Bottom Tab Bar -->
  <rect x="10" y="720" width="340" height="70" rx="0" fill="#fff" stroke="#f0f0f0" stroke-width="1"/>
  <text x="40" y="750" style="font-family:-apple-system,sans-serif;font-size:18px;">🏠</text>
  <text x="34" y="766" class="tab-text">首页</text>
  <text x="110" y="750" style="font-family:-apple-system,sans-serif;font-size:18px;">📚</text>
  <text x="102" y="766" class="tab-text">菜品库</text>
  <text x="180" y="750" style="font-family:-apple-system,sans-serif;font-size:18px;">🍽️</text>
  <text x="170" y="766" class="tab-text">点餐</text>
  <text x="248" y="750" style="font-family:-apple-system,sans-serif;font-size:18px;">💫</text>
  <text x="242" y="766" class="tab-text">心愿单</text>
  <text x="310" y="750" style="font-family:-apple-system,sans-serif;font-size:18px;">👤</text>
  <text x="306" y="766" class="tab-active">我的</text>
</svg>
